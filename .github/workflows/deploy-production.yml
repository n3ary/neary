name: Deploy to Production

on:
  push:
    branches: [main]
    # Skip deploy when only the version-bump commit lands (avoid infinite loop
    # if we ever re-enable auto-bump).
    paths-ignore:
      - '**/CHANGELOG.md'

# Only one deploy at a time; cancel in-progress if a new merge lands.
concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skip runs triggered by the bot's own commits (safety net).
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to Netlify
        run: netlify deploy --prod --dir=dist --functions=netlify/functions --skip-functions-cache
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
