name: Deploy to Production

on:
  push:
    branches: [main]
    # Skip deploy when only the version-bump commit lands (avoid infinite loop
    # if we ever re-enable auto-bump).
    paths-ignore:
      - '**/CHANGELOG.md'

# Only one deploy at a time; cancel in-progress if a new merge lands.
concurrency:
  group: production-deploy
  cancel-in-progress: true

# packages: read so `npm ci` can install @n3ary/neary-gtfs-spec from
# GitHub Packages (the org's default token has read access).
permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skip runs triggered by the bot's own commits (safety net).
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      # Deploy the static build to Cloudflare Pages via wrangler.
      # Wrangler reads CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID from
      # the environment; the token needs the "Cloudflare Pages: Edit"
      # scope. Custom domain (n3ary.com) is attached to the project
      # once (out of band); each deploy is picked up automatically.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build --project-name=neary --branch=main
