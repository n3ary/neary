name: Deploy to Production

on:
  push:
    branches: [main]
    # Skip deploy when only the version-bump commit lands (avoid infinite loop
    # if we ever re-enable auto-bump).
    paths-ignore:
      - '**/CHANGELOG.md'

# Only one deploy at a time; cancel in-progress if a new merge lands.
concurrency:
  group: production-deploy
  cancel-in-progress: true

# packages: read so `npm ci` can install @n3ary/neary-gtfs-spec from
# GitHub Packages (the org's default token has read access).
permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skip runs triggered by the bot's own commits (safety net).
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: "Checkout neary-gtfs (provides @n3ary/neary-gtfs-spec for the file: dep)"
        uses: actions/checkout@v7
        with:
          repository: n3ary/neary-gtfs
          path: vendor/neary-gtfs

      - name: Setup Node (for vendored neary-gtfs build)
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11

      - name: Build vendored @n3ary/neary-gtfs-spec
        # The file: dep points at vendor/neary-gtfs/packages/spec which
        # is a fresh git checkout — src/ exists but dist/ doesn't.
        # The TypeScript + vite build needs the compiled .d.ts and
        # .js files. Build them once before npm ci so the dep is
        # self-contained when symlinked into node_modules.
        working-directory: vendor/neary-gtfs
        run: pnpm install --frozen-lockfile --trust-lockfile && pnpm build

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      # Deploy the static build to Cloudflare Pages via wrangler.
      # Wrangler reads CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID from
      # the environment; the token needs the "Cloudflare Pages: Edit"
      # scope. Custom domain (n3ary.com) is attached to the project
      # once (out of band); each deploy is picked up automatically.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build --project-name=neary --branch=main
