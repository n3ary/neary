# ----------------------------------------------------------------------------
# [deploy] PWA to Cloudflare Pages (on push to main + manual)
#
# Builds the PWA and deploys to the Cloudflare Pages project 'neary'
# (app.n3ary.com) on every push to main. Manual trigger exists for
# the case where secrets / config changed but the code didn't.
#
# Trigger:     push to main, manual
# Permissions: contents: read
# Secrets:     NPM_TOKEN, CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID,
#              CLOUDFLARE_ZONE_ID
# Owner:       @ciotlosm
# Run time:    ~3-5 min
# ----------------------------------------------------------------------------
name: '[deploy] PWA to Cloudflare Pages (on push to main + manual)'

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one deploy at a time; cancel in-progress if a new merge lands.
concurrency:
  group: production-deploy
  cancel-in-progress: true

# Contents: read so we can check out the source.
# The @n3ary/gtfs-spec install uses the NPM_TOKEN secret
# (an org token with read:packages on the org) rather than the
# GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  deploy:
    # Skip deploy when the release bot (n3ary-release-bot) is the actor.
    # The bot's release/calver-* PRs land on main as a squash merge; the
    # `push` event fires with `github.actor = n3ary-release-bot[bot]`.
    # Deploying a version-only commit would re-run a deploy whose
    # artefact is byte-identical to the previous one. The release bot
    # bumps `package.json#version`; nothing else changes.
    if: github.actor == 'n3ary-release-bot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        # No explicit `version:` - pnpm/action-setup would conflict with
        # the `packageManager: pnpm@<X.Y.Z>` field in package.json
        # (the action errors with "Multiple versions of pnpm specified"
        # when both are present). Auto-detect from packageManager instead;
        # that is the org-wide source of truth per the pr-validation
        # workflow and the n3ary/actions v22 shared action.
        # The pnpm cache key in setup-node derives from the same
        # auto-detected version, so cache hits still work.

      - name: Install dependencies
        # The @n3ary scope maps to GitHub Packages (see .npmrc).
        # NPM_TOKEN is an org token with read:packages on @n3ary/gtfs-spec.
        # Set via the repo's secrets in GitHub web UI.
        #
        # pnpm 11 refuses to expand env vars in project .npmrc (it
        # considers the file committed and could leak the secret to
        # an attacker-controlled registry). Use `pnpm config set`
        # to write the credential to user-level ~/.npmrc at install
        # time -- that's an untracked, per-run path.
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pnpm config set //npm.pkg.github.com/:_authToken "$NPM_TOKEN"
          pnpm install --frozen-lockfile

      - name: Build production bundle
        run: pnpm run build

      # Deploy the static build to Cloudflare Pages via wrangler.
      # Wrangler reads CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID from
      # the environment; the token needs the "Cloudflare Pages: Edit"
      # scope. Custom domain (app.n3ary.com) is attached to the project
      # once (out of band); each deploy is picked up automatically.
      #
      # The Cloudflare Pages project is still named 'neary' even after
      # the repo rename. Renaming a Pages project would orphan the
      # custom-domain binding until re-attached, so we keep the
      # deploy-time reference as 'neary'. Same rationale as the
      # OPFS_POOL_NAME='neary-gtfs' + 'neary-gtfs' R2 bucket note in
      # the rename commit body: published/data artifacts keep their
      # old names, only the source-side references change.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # --commit-dirty=true silences wrangler's "uncommitted changes"
          # warning. The wrangler-action@v4 auto-runs `pnpm add wrangler@4`
          # which mutates package.json + pnpm-lock.yaml in the runner's
          # working tree; wrangler then sees the dirty tree. The mutation
          # is ephemeral (the runner is fresh per deploy) and never
          # touches the real repo, so just acknowledge it.
          command: pages deploy build --project-name=neary --branch=main --commit-dirty=true

      # Purge the Cloudflare edge cache for `/_app/immutable/*` and
      # the SW entrypoint. The static `_headers` file is read at
      # deploy time; the headers (including the CSP) get baked into
      # the response and CACHED at the edge on first request. Any
      # subsequent change to `_headers` does NOT reach files that
      # are already in the edge cache -- they keep serving the old
      # response headers (with the old CSP) until the cache TTL
      # expires (`max-age=14400` = 4h for hashed immutable assets).
      #
      # Concretely: PR #291 added `gtfs-rt.n3ary.com` to the
      # `connect-src` directive. The next deploy reached the
      # document and most chunks (whose hashes had changed), but
      # `gtfs.worker-C9WVoLDT.js` kept the old CSP because the
      # worker source didn't change between deploys. Workers
      # inherit their CSP from the response that loaded them
      # (verified in WebKit 26.5 / Safari 17+), so the live feed
      # call was blocked by the old CSP.
      #
      # The purge runs AFTER the deploy so the new files are in
      # place. The API token needs the `Zone: Purge` scope on
      # n3ary.com (or `Zone: Edit`); if the existing
      # CLOUDFLARE_API_TOKEN is `Pages: Edit`-only, rotate it to
      # add the zone permission.
      - name: Purge Cloudflare edge cache for static assets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          set -euo pipefail
          echo "Purging cache for zone ${CLOUDFLARE_ZONE_ID}…"
          response=$(curl -sf -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{
              "prefixes": [
                "https://app.n3ary.com/_app/immutable/workers/",
                "https://app.n3ary.com/_app/immutable/chunks/",
                "https://app.n3ary.com/_app/immutable/assets/",
                "https://app.n3ary.com/_app/immutable/nodes/",
                "https://app.n3ary.com/_app/immutable/entry/",
                "https://app.n3ary.com/service-worker.js",
                "https://app.n3ary.com/registerSW.js",
                "https://app.n3ary.com/manifest.webmanifest"
              ]
            }')
          echo "$response" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          if not d.get('success'):
            print('::error::cache purge failed:', d.get('errors', d))
            sys.exit(1)
          print('Cache purged:', d.get('result', {}).get('id', 'ok'))
          "

      # Smoke test: fetch a worker file from the edge and assert
      # the CSP includes the latest connect-src origin. Catches
      # the case where the purge step above silently failed (e.g.
      # token scope changed) and a future `_headers` change is
      # masked by a still-cached old response. Runs against the
      # production origin, not the SW or any local cache.
      - name: Verify CSP on a worker file
        env:
          EXPECTED_ORIGIN: 'gtfs-rt.n3ary.com'
        run: |
          # Find a hashed worker file URL from the precache manifest
          # emitted by the build. Falls back to a known path if the
          # manifest is unavailable.
          worker_url=$(python3 -c "
          import json, glob, os
          files = glob.glob('build/_app/immutable/workers/*.js')
          if not files:
            print('https://app.n3ary.com/_app/immutable/workers/')
          else:
            print('https://app.n3ary.com/_app/immutable/workers/' + os.path.basename(files[0]))
          ")
          echo "Checking CSP on: ${worker_url}"
          csp=$(curl -sI "${worker_url}" | awk -F': ' 'tolower($1)=="content-security-policy"{print $2}' | tr -d '\r')
          if [ -z "${csp}" ]; then
            echo "::error::no Content-Security-Policy header on ${worker_url}"
            exit 1
          fi
          if ! echo "${csp}" | grep -q "${EXPECTED_ORIGIN}"; then
            echo "::error::CSP on ${worker_url} does not include ${EXPECTED_ORIGIN}"
            echo "Got: ${csp}"
            exit 1
          fi
          echo "CSP on ${worker_url} includes ${EXPECTED_ORIGIN} ✓"
