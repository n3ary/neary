# ----------------------------------------------------------------------------
# [check] PR validation (on PR)
#
# Validates every PR: shared ASCII + standards-drift checks, repo-specific
# check/test/build. Never pushes to the branch.
#
# Trigger:     pull_request
# Permissions: contents: read
# Secrets:     NPM_TOKEN (for pnpm install from GH Packages)
# Owner:       @ciotlosm
# Run time:    ~3-7 min (retrigger v2)
# Force-retrigger: 2026-07-12
# Note: workflow triggers on pull_request events to this branch.
# ----------------------------------------------------------------------------
name: '[check] PR validation (on PR)'

on:
  pull_request:
    branches: [main]

# Shared base PR-validation lives in n3ary/actions. enable-drift-check
# is true: app vendors n3ary/standards under docs/standards/.
# Repo-specific jobs (check/test/build) stay local.

permissions:
  contents: read

jobs:
  pr-check:
    uses: n3ary/actions/.github/workflows/pr-check.yml@main

  validate:
    runs-on: ubuntu-latest
    # Skip Dependabot PRs: GitHub blocks `dependabot[bot]` from
    # accessing repository secrets (NPM_TOKEN) by default, so
    # `pnpm install` would 401 on an empty _authToken. Dependabot
    # PRs only bump version refs in this repo, so the heavy
    # validation adds no signal here. Shared checks (ASCII-only,
    # Standards drift) above still run.
    # Refs:
    #   - https://docs.github.com/en/code-security/dependabot/working-with-dependabot/configuring-access-to-private-packages-for-dependabot-version-updates
    if: github.actor != 'dependabot[bot]'

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm with GH Packages auth + install
        # Replaces the previous ~20-line manual setup (checkout +
        # setup-node + setup-pnpm + HOME-scoped .npmrc + pnpm
        # install). App uses --no-frozen-lockfile because pnpm 11's
        # lockfile supply-chain re-verification can fail on stale
        # entries from registry republishes; clean + re-resolve keeps
        # the install robust.
        uses: n3ary/actions/.github/actions/setup-pnpm-gh-packages-auth@v23
        with:
          auth-token: ${{ secrets.NPM_TOKEN }}
          install-args: '--no-frozen-lockfile'

      - name: Type check
        run: pnpm run check

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm run build
