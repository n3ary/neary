name: PR Validation

on:
  pull_request:
    branches: [main]

# Shared base PR-validation lives in n3ary/actions. enable-drift-check
# is true: app vendors n3ary/standards under docs/standards/.
# Repo-specific jobs (check/test/build + version-bump) stay local.
#
# Auto-bump lives in its own non-required job (`auto-bump`) below.
# It depends on `validate` and is intentionally NOT in the required
# status checks: the auto-bump only edits `package.json#version`,
# so it can't introduce a code regression, and making it required
# would force every PR to wait for a second CI cycle (the bot
# pushes a new commit after `validate` passes, which would otherwise
# re-block the PR with `strict: true` status checks).

permissions:
  contents: write  # needed by the version-bump action to push the bot commit

jobs:
  shared:
    uses: n3ary/actions/.github/workflows/pr-validation.yml@v5

  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm with GH Packages auth + install
        # Replaces the previous ~20-line manual setup (checkout +
        # setup-node + setup-pnpm + HOME-scoped .npmrc + pnpm
        # install). App uses --no-frozen-lockfile because pnpm 11's
        # lockfile supply-chain re-verification can fail on stale
        # entries from registry republishes; clean + re-resolve keeps
        # the install robust.
        uses: n3ary/actions/.github/actions/setup-pnpm-gh-packages-auth@v9
        with:
          auth-token: ${{ secrets.NPM_TOKEN }}
          install-args: '--no-frozen-lockfile'

      - name: Type check
        run: pnpm run check

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm run build

  auto-bump:
    # Not in required status checks by design: see comment at the
    # top of this file.
    needs: validate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-bump version to main + 1
        # Replaces ~80 lines of inline auto-bump logic. The action
        # handles metadata-only skip, computes next version (preserving
        # pre-release suffixes like '1.5.87'), commits package.json
        # (and pnpm-lock.yaml if dirty), and pushes race-safely.
        uses: n3ary/actions/.github/actions/version-bump@v6