[build]
  command = "npm run build"
  publish = "dist"

# Local `netlify dev` configuration.
# This project's Vite dev server runs on port 5175 (see vite.config.ts), not
# Vite's default 5173. Without this, Netlify Dev auto-detects Vite, waits on
# 5173, and times out. `#custom` disables framework auto-detection and just
# runs the command, waits for targetPort, then serves on `port` (8888).
[dev]
  command = "npm run dev"
  targetPort = 5175
  framework = "#custom"
  publish = "dist"

# API proxy redirects (must come BEFORE the SPA redirect)
[[redirects]]
  from = "/api/tranzy/*"
  to = "https://api.tranzy.ai/:splat"
  status = 200
  force = true

# Serve the GTFS schedule payload from Netlify Blobs.
# Netlify Blobs have no built-in public URL, so /data/schedule.json is rewritten
# to the schedule-serve function, which reads the blob and returns it as JSON.
# Must come BEFORE the SPA catch-all so it is not swallowed by /* -> /index.html.
[[redirects]]
  from = "/data/schedule.json"
  to = "/.netlify/functions/schedule-serve"
  status = 200

# SPA redirect for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for better performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache the GTFS schedule payload at the edge for 1 hour.
# The schedule-serve function also sets this header on its response, since
# netlify.toml headers are not reliably applied to function/rewrite responses.
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"