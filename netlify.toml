[build]
  command = "npm run build"
  publish = "dist"

# Local `netlify dev` configuration.
# This project's Vite dev server runs on port 5175 (see vite.config.ts), not
# Vite's default 5173. Without this, Netlify Dev auto-detects Vite, waits on
# 5173, and times out. `#custom` disables framework auto-detection and just
# runs the command, waits for targetPort, then serves on `port` (8888).
[dev]
  command = "npm run dev"
  targetPort = 5175
  framework = "#custom"
  publish = "dist"

# API proxy redirects (must come BEFORE the SPA redirect)
[[redirects]]
  from = "/api/tranzy/*"
  to = "https://api.tranzy.ai/:splat"
  status = 200
  force = true

# Proxy schedule data from neary-gtfs GitHub Releases (CORS workaround).
# The neary-gtfs repo publishes a compact JSON per agency as a release asset.
# The client fetches /data/schedule/<id>.json → Netlify proxies to GitHub.
# No more Netlify Blobs, no more schedule-pipeline/serve functions needed.
#
# NOTE: Netlify's production edge supports :splat params in the `to` URL.
# For local `netlify dev`, the parameter substitution may not work — test
# against the deployed site or use the direct GitHub URL.
[[redirects]]
  from = "/data/schedule/2.json"
  to = "https://github.com/ciotlosm/neary-gtfs/releases/latest/download/agency-2-schedule.json"
  status = 200
  force = true

# SPA redirect for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for better performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache the schedule payload proxied from GitHub at the edge for 1 hour.
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"