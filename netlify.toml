[build]
  command = "npm run build"
  publish = "dist"

# Local `netlify dev` configuration.
# This project's Vite dev server runs on port 5175 (see vite.config.ts), not
# Vite's default 5173. Without this, Netlify Dev auto-detects Vite, waits on
# 5173, and times out. `#custom` disables framework auto-detection and just
# runs the command, waits for targetPort, then serves on `port` (8888).
[dev]
  command = "npm run dev"
  targetPort = 5175
  framework = "#custom"
  publish = "dist"

# API proxy redirects (must come BEFORE the SPA redirect)
[[redirects]]
  from = "/api/tranzy/*"
  to = "https://api.tranzy.ai/:splat"
  status = 200
  force = true

# GTFS-RT feeds are protobuf-binary and don't expose CORS. Proxy them so
# the client can fetch /api/rt/<feed>/<endpoint> regardless of origin.
# Mirrors the dev-time Vite proxy in apps/web/vite.config.ts.
[[redirects]]
  from = "/api/rt/cluj-napoca/*"
  to = "https://cluj-rt-feed.gtfs.ro/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/rt/bucuresti-ilfov/*"
  to = "https://gtfs.tpbi.ro/api/gtfs-rt/:splat"
  status = 200
  force = true

# Prevent caching on API proxy responses
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# SPA redirect for client-side routing (no force — static files take precedence)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for better performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
