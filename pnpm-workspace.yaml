packages:
  - '.'
minimumReleaseAgeExclude:
  - '@n3ary/gtfs-spec@0.3.0'
  - '@n3ary/gtfs-spec@0.3.1'
  - '@n3ary/gtfs-spec@0.3.2'

# Force a patched cookie across the dep tree. cookie<0.7.0 is flagged
# by Dependabot as GHSA-pxg6-pf52-xh8x / CVE-2024-47764; the package
# is pulled in transitively (via sveltekit/svelte) and we wait on the
# upstream bumps to roll through, so the override keeps the lockfile
# deterministic in the meantime. Bump to a tilde once the upstream
# constraint catches up and this override can be deleted.
overrides:
  cookie: ^0.7.0

# Minimum release age for newly published packages. Protects against
# freshly-published typosquats slipping into the install. Set to 0
# here because the @n3ary/gtfs-spec dep is a private in-org package
# that's versioned in lockstep with the consumer; no supply-chain
# risk from short windows. Bump if adopting from npmjs.

# pnpm 11 blocks postinstall/build scripts by default. The Cloudflare
# Pages deploy workflow runs `pnpm add wrangler@4` from the
# cloudflare/wrangler-action@v4, which transitively needs native
# binaries built from esbuild + sharp + workerd's install scripts.
# Pre-approve these so the deploy doesn't fail with
# ERR_PNPM_IGNORED_BUILDS.
#
# Re-evaluate if any of these packages get compromised upstream —
# these scripts run on the deploy runner, not in the published bundle.
allowBuilds:
  esbuild: true
  sharp: true
  workerd: true
